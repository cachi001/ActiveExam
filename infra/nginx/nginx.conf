# Nginx — reverse proxy + terminacion TLS 1.3 (DD-10, `08` Seguridad).
#
# - SOLO TLS 1.3 (sin downgrade a 1.2/1.1/1.0).
# - HSTS con preload (`08` Seguridad).
# - Las instancias FastAPI caidas salen del pool via passive health checks
#   (max_fails / fail_timeout): el upstream las marca down y deja de rutearles.
# - El escalado es horizontal: agregar replicas de `api` y entradas al upstream
#   (o usar resolucion DNS de Docker con `docker compose up --scale api=N`).
#
# Los certificados de `tls/` son self-signed SOLO para local (ver tls/README.md).
# En prod los emite la PKI/ACME; nunca se versionan claves privadas reales.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs estructurados a stdout (twelve-factor; recogidos por el colector).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Pool de instancias FastAPI. Passive health check: tras 3 fallos en 15s,
    # la instancia sale del pool por fail_timeout (DD-10).
    upstream proctoring_api {
        server api:8000 max_fails=3 fail_timeout=15s;
        # Agregar mas replicas aqui al escalar horizontalmente:
        # server api-2:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # Redirige HTTP -> HTTPS (sin trafico en claro).
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # --- TLS 1.3 unicamente ---
        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # HSTS con preload (`08` Seguridad).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Healthcheck de las instancias FastAPI (para pooling/observabilidad).
        location /api/v1/health/ {
            proxy_pass http://proctoring_api;
            proxy_set_header Host $host;
            proxy_next_upstream error timeout http_502 http_503;
        }

        location / {
            proxy_pass http://proctoring_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Una instancia caida -> probar la siguiente del pool.
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
