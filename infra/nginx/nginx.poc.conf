# Nginx PoC C-03 (DESCARTABLE) — reverse proxy del harness de carga MULTI-INSTANCIA.
#
# HTTP plano en :8080 (sin TLS: el concern (c) mide fan-out, no el handshake TLS).
# Balancea round-robin SIN sticky a las 3 instancias FastAPI (api/api2/api3).
#
# LA CLAVE DEL EXPERIMENTO (concern c y b):
#   Round-robin puro -> el WS del estudiante y el SSE del panel caen en instancias
#   DISTINTAS. Que el panel reciba el evento de un estudiante en otra instancia solo
#   es posible porque el backplane es Postgres LISTEN/NOTIFY (no memoria local). Si
#   funciona -> A4 desacopla instancias = veredicto. Por eso NO hay ip_hash/sticky.
#
# Este archivo es DESCARTABLE. La config de produccion (TLS 1.3, HSTS) es nginx.conf.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Logs estructurados a stdout (twelve-factor).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Mapa para el upgrade de WebSocket: si la request trae Upgrade, lo propaga;
    # si no, cierra el header Connection (no rompe HTTP normal).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Pool de las 3 instancias. Round-robin (default, SIN sticky). Passive health
    # check: tras 3 fallos en 10 s la instancia sale del pool (para la task 5.7 del
    # concern b: bajar/subir una instancia y verificar reconexion transparente).
    upstream poc_api {
        server api:8000  max_fails=3 fail_timeout=10s;
        server api2:8000 max_fails=3 fail_timeout=10s;
        server api3:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 8080;
        server_name _;

        # --- WebSocket del estudiante (C-10/DD-16): requiere Upgrade -----------
        # El `location /` generico cierra Connection ("") y romperia el handshake WS;
        # por eso el WS tiene su propio location con los headers de upgrade.
        location /api/v1/events/ws {
            proxy_pass http://poc_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WS long-lived: timeouts largos para no cortar la sesion del estudiante.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --- SSE del panel (concern c): long-lived, SIN buffering --------------
        # proxy_buffering off es CRITICO: con buffering Nginx acumula y mediriamos
        # el buffer de Nginx en vez del fan-out real. El endpoint ya manda
        # X-Accel-Buffering: no, pero lo dejamos explicito (defensa en profundidad).
        location /poc/panel/stream {
            proxy_pass http://poc_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            # SSE long-lived: que Nginx no corte el stream a los 60 s default.
            proxy_read_timeout 3600s;
        }

        # --- Resto del trafico (REST, /metrics, /health) ----------------------
        location / {
            proxy_pass http://poc_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            # Instancia caida -> probar la siguiente del pool (concern b).
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
