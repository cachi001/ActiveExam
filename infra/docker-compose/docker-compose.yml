# =============================================================================
# Stack local del MVP (C-04, local-stack-compose). Docker Compose primero (DD-11);
# K8s es evolucion operacional posterior.
#
# Imagenes PINNEADAS por version (reproducibilidad).
# Secretos: NO se hornean en imagenes. Los placeholders vienen de `.env` (local);
# en prod se inyectan via Vault/tmpfs (DD-5). Ver `.env.example`.
#
# Mensajeria: la pieza la decide la PoC C-03. Por OMISION (A4 = Postgres-como-cola)
# NO se levanta Redis ni RabbitMQ (DD-19). Quedan como perfiles comentados al final,
# "solo arquitectura de escala", activables si C-03 los promueve por metrica.
# =============================================================================

name: proctoring

services:
  # --- Base de datos: PostgreSQL + TimescaleDB -------------------------------
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [proctoring]

  # --- Object storage: MinIO/S3 (bucket WORM de evidencia en changes futuros) -
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [proctoring]

  # --- Identidad: Keycloak (auth REAL es C-06; aqui solo corre) ---------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [proctoring]

  # --- API FastAPI (mono-hilo, DD-10). Escalable: `--scale api=N` -------------
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO exponer puerto directo: el trafico entra por Nginx (TLS 1.3).
    expose: ["8000"]
    networks: [proctoring]

  # --- Reverse proxy + terminacion TLS 1.3 (DD-10) ---------------------------
  nginx:
    image: nginx:1.27.3-alpine
    depends_on: [api]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/tls:/etc/nginx/tls:ro
    networks: [proctoring]

  # --- Observabilidad base (DD-12): Prometheus / Loki / Tempo / Grafana -------
  prometheus:
    image: prom/prometheus:v3.0.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [proctoring]

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks: [proctoring]

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ../observability/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
    networks: [proctoring]

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, tempo]
    networks: [proctoring]

  # ---------------------------------------------------------------------------
  # PIEZAS DE ESCALA (SAD) — NO levantar por defecto (DD-19). Activar SOLO si la
  # PoC C-03 las promueve por metrica. Por omision el MVP usa Postgres-como-cola.
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7.4.1-alpine
  #   networks: [proctoring]
  # rabbitmq:
  #   image: rabbitmq:4.0.5-management-alpine
  #   networks: [proctoring]

volumes:
  postgres_data:
  minio_data:

networks:
  proctoring:
    driver: bridge
