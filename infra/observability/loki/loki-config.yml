# Loki — agregacion de logs JSON estructurados (DD-12).
# Config minima monolitica para el stack local. Los logs de la API llegan a
# stdout en JSON (con trace_id) y un colector (Promtail/Alloy, change futuro) o
# el driver de logging de Docker los empuja aqui.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
