# Tempo — backend de trazas (DD-12). Recibe spans via OTLP desde la API
# (OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
