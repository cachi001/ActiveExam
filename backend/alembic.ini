# Configuracion de Alembic.
#
# La URL de la base NO se hardcodea aqui: se inyecta por entorno (DATABASE_URL,
# via Vault/tmpfs) y la resuelve `migrations/env.py` (twelve-factor). El valor de
# `sqlalchemy.url` queda vacio a proposito: si se hardcodeara, seria un secreto
# en el repo.

[alembic]
script_location = migrations
prepend_sys_path = .
# version_path_separator default
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
