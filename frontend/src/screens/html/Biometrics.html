<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verificación de Identidad | ActiveExam</title>

                    "outline-variant": "#c7c4d6",

                    "on-tertiary-container": "#ece9ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#180065",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e8e8ec",
                    "error-container": "#ffdad6",
                    "tertiary": "#515067",
                    "secondary": "#5845ca",
                    "primary-container": "#5b5bd6",
                    "on-primary-container": "#edeaff",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e2e2e6",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#c7bfff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#7260e5",
                    "inverse-surface": "#2e3034",
                    "inverse-on-surface": "#f0f0f4",

                    "on-secondary-fixed-variant": "#432bb4",

                    "background": "#f9f9fd",

            "borderRadius": {

            "spacing": {
                    "xs": "8px",
                    "sidebar-width": "260px",
                    "container-max": "1280px",
                    "gutter": "24px",
                    "xl": "32px",

                    "lg": "24px",

                    "md": "16px"
            },
            "fontFamily": {
                    "title-lg": ["Plus Jakarta Sans"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],

                    "headline-lg": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"]

          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .camera-overlay {
            mask-image: radial-gradient(ellipse 200px 280px at center, black 100%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 160px 220px at center, black 100%, transparent 100%);
        }

        @keyframes scan-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .scanning-ring {
            animation: scan-glow 2s infinite ease-in-out;
        }

        .progress-fill {
            transition: width 3s linear;
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top Navigation Bar (Simplified Wordmark Only for Focused Journey) -->
<header class="flex justify-center items-center px-lg h-16 w-full sticky top-0 z-50 bg-surface/80 backdrop-blur-md">
<div class="font-headline-md text-headline-md font-bold text-primary">
            ActiveExam
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter max-w-container-max mx-auto w-full">
<!-- Header Text -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Confirmemos que sos vos</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                Mirá a la cámara y seguí las indicaciones. Toma unos segundos.
            </p>
</div>
<!-- Verification Unit -->
<div class="relative w-full max-w-[480px] flex flex-col items-center">
<!-- Camera Container -->
<div class="relative w-[320px] h-[420px] bg-surface-container-highest rounded-[40px] overflow-hidden flex items-center justify-center border border-outline-variant shadow-sm mb-lg">
<!-- Camera Feed Mock -->
<div class="absolute inset-0 w-full h-full">
<img alt="Camera Feed" class="w-full h-full object-cover grayscale-[20%] brightness-110" data-alt="A close-up portrait of a calm student sitting in a well-lit indoor environment, looking directly into a web camera for identity verification. The lighting is soft and even, creating a clean academic atmosphere with professional white and indigo tones. The student has a neutral expression, and the background is slightly blurred to maintain focus on the face. High-quality digital photography style with a warm minimal aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHGimTMq0vYdnpZUe29qBV_SMUU_r8-79CuxY2EiLYraZGFlKFdypN75NVUF8t7uFWitbZbPZmfK2U5f8KZ3-JCQZ2MvHq0USh5rkoAylq3HQsGvVCl4SVk4u60TE2RtJc5VX6RZZSQtePcCA4VyFM7blTG2wNWVZDBnNw3li9uUlsUath7-iPghvmrFvfI9OrwfFaafb_t0OJEd1fx0NQI_nXKFIyviRraZz0KB9YUxfl4yvj75QlzUUFHQhR1Fkm6BxGS6vRa_A"/>
</div>
<!-- Oval Overlay & Scanning Ring -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- The Indigo Detection Ring -->
<div class="w-[220px] h-[300px] border-[3px] border-primary rounded-[50%] scanning-ring shadow-[0_0_20px_rgba(91,91,214,0.3)]"></div>
</div>
<!-- Status Badge -->
<div class="absolute top-4 right-4 flex items-center gap-2 bg-black/40 backdrop-blur-sm px-sm py-1.5 rounded-full border border-white/20">
<div class="w-2 h-2 rounded-full bg-error animate-pulse"></div>
<span class="text-white font-label-sm text-label-sm uppercase tracking-wider">LIVE</span>
</div>
</div>
<!-- Interaction Module -->
<div class="w-full text-center space-y-md">
<!-- Indication -->
<div class="font-title-lg text-title-lg text-primary flex items-center justify-center gap-xs" id="instruction-text">
<span class="material-symbols-outlined text-[28px]" data-icon="visibility">visibility</span>
                    Parpadeá despacio
                </div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="progress-fill h-full bg-primary-container w-0 rounded-full" id="progress-bar"></div>
</div>
<!-- Micro-message -->
<div class="flex items-center justify-center gap-xs text-on-surface-variant opacity-80 pt-md">
<span class="material-symbols-outlined text-[18px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="font-label-sm text-label-sm max-w-[280px]">
                        Tu rostro se procesa de forma cifrada y solo para verificar tu identidad.
                    </p>
</div>
</div>
</div>
</main>
<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-surface-container-low to-transparent pointer-events-none -z-10"></div>
<script>
        // Simple UI interaction logic for the demo
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const instructionText = document.getElementById('instruction-text');
            
            // Start the simulated verification
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 500);

            // Simulate instruction change halfway through
            setTimeout(() => {
                instructionText.innerHTML = `
                    <span class="material-symbols-outlined text-[28px]" data-icon="face">face</span>
                    Mantené la mirada fija
                `;
            }, 3000);

            // Final state simulation
            setTimeout(() => {
                instructionText.innerHTML = `
                    <span class="material-symbols-outlined text-[28px] text-green-600" data-icon="check_circle">check_circle</span>
                    Identidad verificada
                `;
                instructionText.classList.remove('text-primary');
                instructionText.classList.add('text-green-600');
            }, 6000);
        });
    </script>
</body></html>
